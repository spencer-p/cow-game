<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cow Game</title>
    <link rel="icon" type="image/png" href="cow.png">
    <style>
        * { margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            background: #fafafa;
            overflow: hidden;
        }
        #canvas {
            display: block;
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            visibility: hidden;
            /* top/width/height set by JS letterbox computation below */
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font: 18px/1.4 sans-serif;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="loading">Loading...</div>

    <script>
        var loading = document.getElementById('loading');
        var canvas  = document.getElementById('canvas');

        window.addEventListener('keydown', function(e) {
            if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
        }, false);

        // Fixed logical resolution — must match g.width / g.height in main.lua
        var GAME_W = 750, GAME_H = 1334;
        var dpr    = window.devicePixelRatio || 1;
        var vpW    = window.innerWidth;
        var vpH    = window.innerHeight;

        // Scale to fit viewport while preserving aspect ratio (letterbox)
        var scale = Math.min(vpW / GAME_W, vpH / GAME_H);
        var cssW  = Math.round(GAME_W * scale);
        var cssH  = Math.round(GAME_H * scale);
        var cssT  = Math.round((vpH - cssH) / 2);

        // Render at physical pixel resolution for crisp HiDPI output
        var canvasW = Math.round(cssW * dpr);
        var canvasH = Math.round(cssH * dpr);

        // Horizontal centering is handled by CSS (left:50% + translateX(-50%)),
        // which stays correct on window resize without JS.
        canvas.style.setProperty('top',    cssT + 'px', 'important');
        canvas.style.setProperty('width',  cssW + 'px', 'important');
        canvas.style.setProperty('height', cssH + 'px', 'important');

        var Module = {
            arguments: ['./game.love'],
            INITIAL_MEMORY: 16777216,
            printErr: console.error.bind(console),
            canvas: canvas,
            preRun: [function() {
                // Write physical canvas size so conf.lua can set t.window.width/height.
                // preRun fires before main(), which parses conf.lua.
                var s = canvasW + ' ' + canvasH;
                var data = new Uint8Array(s.length);
                for (var i = 0; i < s.length; i++) data[i] = s.charCodeAt(i);
                Module['FS_createDataFile']('/', 'viewport', data, true, true, true);
            }],
            setStatus: function(text) {
                if (!text) {
                    loading.style.display = 'none';
                    canvas.style.visibility = 'visible';
                } else {
                    loading.textContent = text;
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left
                    ? 'Loading... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
                    : '');
            }
        };

        Module.setStatus('Loading...');
        window.onerror = function() { Module.setStatus('Error loading game'); };

        function applicationLoad() { Love(Module); }
    </script>
    <script type="text/javascript" src="game.js"></script>
    <script async type="text/javascript" src="love.js" onload="applicationLoad()"></script>
</body>
</html>
