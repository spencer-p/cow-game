apiVersion: apps/v1
kind: Deployment
metadata:
  name: cow-game
  labels:
    app: cow-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cow-game
  template:
    metadata:
      labels:
        app: cow-game
    spec:
      containers:
      - name: cow-game
        image: cow-game:latest   # push to your registry and update this
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /index.html
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /index.html
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: cow-game-service
  labels:
    app: cow-game
spec:
  type: ClusterIP
  selector:
    app: cow-game
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    name: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cow-game-ingress
  labels:
    app: cow-game
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod   # remove if not using cert-manager
spec:
  tls:
  - hosts:
    - cowgame.spencerjp.dev
    secretName: cow-game-tls
  rules:
  - host: cowgame.spencerjp.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cow-game-service
            port:
              number: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cow-game-network-policy
spec:
  podSelector:
    matchLabels:
      app: cow-game
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - namespaceSelector: {}
